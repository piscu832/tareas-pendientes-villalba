<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAREAS PENDIENTES</title>
    <meta name="description" content="Una aplicación de gestión de tareas tipo Kanban moderna y eficiente.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="LOGO TAREAS.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-900 font-['Raleway'] min-h-screen">
    
    <!-- Navigation / Header -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-10 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
            <div class="flex items-center gap-3">
                <img src="LOGO TAREAS.png" alt="Logo Tareas" class="h-12 w-auto object-contain">
                <div class="flex flex-col">
                    <h1 class="text-xl font-extrabold tracking-tight text-[#1C3F87] uppercase leading-none">Tareas Pendientes</h1>
                    <span class="text-[10px] font-medium text-slate-500 tracking-wider mt-1 uppercase">Ingenio y Experiencia al Servicio de la Salud</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="add-task-btn" class="hidden bg-[#1C3F87] hover:bg-[#16326b] text-white px-5 py-2.5 rounded-lg font-bold transition-all flex items-center gap-2 shadow-md hover:shadow-lg active:scale-95 text-sm uppercase tracking-wider">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Nueva Tarea
                </button>
                <button id="logout-btn" class="hidden text-slate-400 hover:text-rose-600 font-bold text-xs uppercase tracking-widest transition-colors">
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 bg-white z-[60] flex items-center justify-center p-4">
        <div class="w-full max-w-md space-y-8 animate-fade-in">
            <div class="text-center">
                <img src="LOGO TAREAS.png" alt="Logo Villalba" class="h-20 w-auto mx-auto mb-4">
                <h2 class="text-3xl font-black text-[#1C3F87] uppercase tracking-tight">Acceso Institucional</h2>
                <p class="text-slate-500 mt-2 font-medium">Ingresa tus credenciales para gestionar tus tareas</p>
            </div>
            
            <div class="bg-slate-50 p-8 rounded-3xl border border-slate-100 shadow-xl">
                <form id="auth-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-widest mb-1">Email Corporativo</label>
                        <input type="email" id="auth-email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#1C3F87] focus:border-transparent outline-none transition-all" placeholder="ejemplo@villalba.com">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-widest mb-1">Contraseña</label>
                        <input type="password" id="auth-password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#1C3F87] focus:border-transparent outline-none transition-all" placeholder="••••••••">
                    </div>
                    <button type="submit" id="auth-submit-btn" class="w-full py-4 bg-[#1C3F87] text-white rounded-xl font-black uppercase tracking-widest hover:bg-[#16326b] shadow-lg transition-all active:scale-[0.98]">
                        Iniciar Sesión
                    </button>
                    <div class="text-center pt-2">
                        <button type="button" id="toggle-auth-mode" class="text-xs font-bold text-slate-400 hover:text-[#1C3F87] transition-colors uppercase tracking-wider">
                            ¿No tienes cuenta? Regístrate aquí
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="text-center">
                <span class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.2em]">Villalba Ingenio y Experiencia al Servicio de la Salud</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main id="app-content" class="max-w-7xl mx-auto p-6 opacity-0 transition-opacity duration-500 pointer-events-none">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Column: Pendiente -->
            <div class="kanban-column flex flex-col gap-4" id="col-todo">
                <div class="flex items-center justify-between px-2">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-slate-400"></span>
                        <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500">Pendiente</h2>
                    </div>
                    <span class="task-count text-xs font-bold bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full" id="count-todo">0</span>
                </div>
                <div class="column-content min-h-[500px] flex flex-col gap-3 rounded-xl transition-colors duration-200" id="tasks-todo">
                    <!-- Tasks go here -->
                </div>
            </div>

            <!-- Column: En proceso -->
            <div class="kanban-column flex flex-col gap-4" id="col-doing">
                <div class="flex items-center justify-between px-2">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-blue-500"></span>
                        <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500">En proceso</h2>
                    </div>
                    <span class="task-count text-xs font-bold bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full" id="count-doing">0</span>
                </div>
                <div class="column-content min-h-[500px] flex flex-col gap-3 rounded-xl transition-colors duration-200" id="tasks-doing">
                    <!-- Tasks go here -->
                </div>
            </div>

            <!-- Column: Terminado -->
            <div class="kanban-column flex flex-col gap-4" id="col-done">
                <div class="flex items-center justify-between px-2">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
                        <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500">Terminado</h2>
                    </div>
                    <span class="task-count text-xs font-bold bg-emerald-100 text-emerald-600 px-2 py-0.5 rounded-full" id="count-done">0</span>
                </div>
                <div class="column-content min-h-[500px] flex flex-col gap-3 rounded-xl transition-colors duration-200" id="tasks-done">
                    <!-- Tasks go here -->
                </div>
            </div>

        </div>
    </main>

    <!-- Modal for Add/Edit -->
    <div id="task-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all duration-300 scale-95 opacity-0" id="modal-container">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 id="modal-title" class="text-lg font-bold text-slate-800">Nueva Tarea</h3>
                <button id="close-modal" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <form id="task-form" class="p-6 space-y-4">
                <input type="hidden" id="task-id">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Título</label>
                    <input type="text" id="input-title" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-[#1C3F87] focus:border-transparent outline-none transition-all" placeholder="Ej: Comprar materiales">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Descripción</label>
                    <textarea id="input-desc" rows="3" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-[#1C3F87] focus:border-transparent outline-none transition-all resize-none" placeholder="Detalles de la tarea..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Observaciones</label>
                    <textarea id="input-obs" rows="2" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-[#1C3F87] focus:border-transparent outline-none transition-all resize-none" placeholder="Notas técnicas o comentarios..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Prioridad</label>
                    <select id="input-priority" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-[#1C3F87] focus:border-transparent outline-none transition-all">
                        <option value="baja">Baja (Verde)</option>
                        <option value="media">Media (Amarillo)</option>
                        <option value="alta">Alta (Rojo)</option>
                    </select>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" id="cancel-btn" class="flex-1 px-4 py-2 rounded-lg border border-slate-200 font-bold text-slate-600 hover:bg-slate-50 transition-all uppercase tracking-wider text-xs">Cancelar</button>
                    <button type="submit" id="save-btn" class="flex-1 px-4 py-2 rounded-lg bg-[#1C3F87] text-white font-bold hover:bg-[#16326b] shadow-md transition-all uppercase tracking-wider text-xs">Guardar Tarea</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
